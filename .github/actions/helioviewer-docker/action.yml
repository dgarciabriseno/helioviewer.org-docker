name: 'Helioviewer Docker Setup'
description: 'Setup and start Helioviewer Docker containers'

inputs:
  docker-repo:
    description: 'Repository to checkout for helioviewer.org-docker (owner/repo)'
    required: false
    default: 'Helioviewer-Project/helioviewer.org-docker'
  docker-ref:
    description: 'Git ref to checkout for helioviewer.org-docker repository'
    required: false
    default: 'main'
  api-repo:
    description: 'Repository to use for the api submodule (owner/repo)'
    required: false
    default: 'Helioviewer-Project/api'
  api-ref:
    description: 'Git ref to checkout for api submodule'
    required: false
    default: 'main'
  helioviewer-org-repo:
    description: 'Repository to use for the helioviewer.org submodule (owner/repo)'
    required: false
    default: 'Helioviewer-Project/helioviewer.org'
  helioviewer-org-ref:
    description: 'Git ref to checkout for helioviewer.org submodule'
    required: false
    default: 'main'

runs:
  using: 'composite'
  steps:
    - name: Checkout helioviewer.org-docker repository
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.docker-repo }}
        ref: ${{ inputs.docker-ref }}
        path: helioviewer.org-docker
        submodules: true

    - name: Checkout api submodule ref
      shell: bash
      working-directory: helioviewer.org-docker
      run: |
        cd api
        git remote set-url origin https://github.com/${{ inputs.api-repo }}
        git fetch origin ${{ inputs.api-ref }}
        git checkout FETCH_HEAD
        git submodule update --init --recursive

    - name: Checkout helioviewer.org submodule ref
      shell: bash
      working-directory: helioviewer.org-docker
      run: |
        cd helioviewer.org
        git remote set-url origin https://github.com/${{ inputs.helioviewer-org-repo }}
        git fetch origin ${{ inputs.helioviewer-org-ref }}
        git checkout FETCH_HEAD
        git submodule update --init --recursive

    - name: Install expect
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y expect

    - name: Cache test data tarball
      uses: actions/cache@v4
      with:
        path: /tmp/sample.tar.gz
        key: helioviewer-sample-tar-v1

    - name: Setup environment and start containers
      shell: bash
      working-directory: helioviewer.org-docker
      run: |
        cp .env.example .env \
        && echo "UID=$(id -u)" >> .env \
        && echo "GID=$(id -g)" >> .env \
        && ./manage up \
        && mkdir -p data/jp2/push \
        && cp compose/*.jp2 data/jp2/push/ \
        && ./manage downloader -d local -b local -m localmove -s "2021-01-01 00:00:00" -e "2022-01-01 00:00:00" \
        && ./manage download_test_data
